---
# Thin shim — delegates to oszuidwest/.github-templates go-release.yml@v2.
# Encoder is bare-metal Pi software (no Docker target), so no docker job.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (edge, vX.Y.Z, or X.Y.Z auto-prefixed)'
        required: true
        default: 'edge'

permissions:
  contents: read

jobs:
  release:
    uses: oszuidwest/.github-templates/.github/workflows/go-release.yml@v2
    with:
      project-name: encoder
      ldflags-target: main
      build-matrix: >-
        [{"os":"linux","arch":"arm64"},
         {"os":"darwin","arch":"arm64"},
         {"os":"darwin","arch":"amd64"},
         {"os":"windows","arch":"amd64"},
         {"os":"windows","arch":"arm64"}]
      version: ${{ inputs.version }}
      release-body: |
        ## Installation

        On Raspberry Pi 4/5 with HiFiBerry card:
        ```bash
        BASE=https://raw.githubusercontent.com/oszuidwest/zwfm-encoder/main
        curl -fsSL "$BASE/deploy/install.sh" | sudo /bin/bash
        ```

        Binary downloads are available below as release assets.
    permissions:
      contents: write
