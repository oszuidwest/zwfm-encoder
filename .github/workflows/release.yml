---
# Encoder is bare-metal Pi software - no docker job.
name: Release

"on":
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (edge, vX.Y.Z, or X.Y.Z auto-prefixed)'
        required: true
        default: 'edge'

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: oszuidwest/.github-templates/.github/workflows/go-ci.yml@v2
    with:
      golangci-lint-version: v2.12.1
      enable-frontend: true

  shell-quality:
    name: Shell Quality
    uses: ./.github/workflows/shell-quality.yml

  release:
    needs:
      - checks
      - shell-quality
    uses: oszuidwest/.github-templates/.github/workflows/go-release.yml@v2
    with:
      project-name: encoder
      ldflags-target: main
      build-matrix: >-
        [{"os":"linux","arch":"arm64"},
         {"os":"darwin","arch":"arm64"},
         {"os":"darwin","arch":"amd64"},
         {"os":"windows","arch":"amd64","ldflags":"-H windowsgui"},
         {"os":"windows","arch":"arm64","ldflags":"-H windowsgui"}]
      version: ${{ inputs.version }}
      allow-tag-rebuild: false
      release-body: |
        ## Installation

        On Raspberry Pi 4/5 with HiFiBerry card:
        ```bash
        BASE=https://raw.githubusercontent.com/oszuidwest/zwfm-encoder/main
        curl -fsSL "$BASE/deploy/install.sh" | sudo /bin/bash
        ```

        Binary downloads are available below as release assets.
    permissions:
      contents: write
