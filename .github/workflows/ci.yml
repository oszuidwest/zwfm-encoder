---
# Hybrid: `go` delegates to go-ci.yml; frontend lint/tests stay inline.
# Dependabot updates bun.lock itself (text lockfile), so no lockfile-refresh job
# is needed. Pull requests run unfiltered so the required `go / Go` and
# `Frontend` checks always report on every PR; the branch ruleset on main
# requires them, and a path-filtered run would leave them never reported,
# blocking merges (and Dependabot auto-merge).
name: CI

"on":
  push:
    branches: ['main']
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.golangci.yaml'
      - 'web/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
      - 'biome.json'
      - '.htmlhintrc'
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  go:
    uses: oszuidwest/.github-templates/.github/workflows/go-ci.yml@v2
    with:
      golangci-lint-version: v2.12.1

  # The shared template builds and tests on linux only; this job makes sure
  # the //go:build windows files (systray, slog fallback) at least compile
  # and vet on every PR instead of breaking at release time.
  go-windows:
    name: Go (windows cross-compile)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build and vet for windows
        env:
          GOOS: windows
        run: |
          go build ./...
          go vet ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test JavaScript
        run: bun run test:js
