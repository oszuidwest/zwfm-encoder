---
# Thin shim — Go job delegates to oszuidwest/.github-templates go-ci.yml@v2.
# Frontend job stays inline because it needs a project-specific lockfile-commit
# step for dependabot PRs (not generic enough for v1).
name: CI

on:
  push:
    branches: ['main']
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.golangci.yaml'
      - 'web/**'
      - 'package.json'
      - 'biome.json'
      - '.htmlhintrc'
  pull_request:
    branches: ['main']
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.golangci.yaml'
      - 'web/**'
      - 'package.json'
      - 'biome.json'
      - '.htmlhintrc'

permissions:
  contents: read

jobs:
  go:
    uses: oszuidwest/.github-templates/.github/workflows/go-ci.yml@v2
    with:
      golangci-lint-version: v2.12.1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    # Needs write to commit refreshed bun.lockb on dependabot PRs.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install ${{ github.actor != 'dependabot[bot]' && '--frozen-lockfile' || '' }}

      - name: Commit updated lockfile
        if: github.actor == 'dependabot[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bun.lockb
          git diff --staged --quiet || git commit -m "chore: update bun.lockb"
          git push

      - name: Lint
        run: bun run lint
