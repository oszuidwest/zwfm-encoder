---
# Hybrid: `go` delegates to go-ci.yml; frontend lint/tests stay inline, while
# Dependabot lockfile refresh runs in a separate write-scoped job. Pull requests
# run unfiltered so the required `go / Go` and `Frontend` checks always report on
# every PR; the branch ruleset on main requires them, and a path-filtered run
# would leave them never reported, blocking merges (and Dependabot auto-merge).
name: CI

"on":
  push:
    branches: ['main']
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.golangci.yaml'
      - 'web/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lockb'
      - 'biome.json'
      - '.htmlhintrc'
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  go:
    uses: oszuidwest/.github-templates/.github/workflows/go-ci.yml@v2
    with:
      golangci-lint-version: v2.12.1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: >-
          bun install
          ${{ github.actor != 'dependabot[bot]' && '--frozen-lockfile' || '' }}

      - name: Lint
        run: bun run lint

      - name: Test JavaScript
        run: bun run test:js

  frontend-lockfile:
    name: Frontend lockfile
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - uses: oven-sh/setup-bun@v2

      - name: Refresh lockfile
        run: bun install --ignore-scripts

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bun.lockb
          git diff --staged --quiet || git commit -m "chore: update bun.lockb"
          git push
